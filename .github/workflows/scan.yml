name: TEA Pullback Scanner

on:
  schedule:
    - cron: "0 0 * * 1-5"  # 20h Québec = 00h UTC
  workflow_dispatch:  # permet lancer à la main

jobs:
  run-scanner:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python bot.py
